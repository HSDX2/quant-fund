# PushPlus 配置（token 请放在 .env 文件中，不要提交到版本控制）
pushplus:
  token: ""  # 实际 token 从环境变量 PUSHPLUS_TOKEN 读取
  topic: ""  # PushPlus 群组编码（可选，需先在 pushplus.plus 创建群组）

# 策略参数
strategy:
  ma_period: 200
  volatility_window: 20
  volatility_max_ratio: 1.5
  target_annual_vol: 0.40
  min_consecutive_declines: 3
  max_consecutive_declines: 5
  single_day_max_decline: -0.03
  stop_loss_pct: -0.07
  below_ma_clear: true
  no_profit_exit_days: 15
  take_profit_partial_pct: 0.05
  take_profit_full_pct: 0.08
  pullback_from_peak_pct: 0.02
  monthly_drawdown_limit: -0.05
  consecutive_stop_loss_limit: 3

  # 买卖规则参数（可在回测中扫描优化）
  trailing_stop:
    enabled: true
    min_gain_pct: 0.08           # 盈利超过 8% 后启动移动止盈
    drawdown_pct: 0.05           # 从最高点回撤超过 5% 则减仓 50%

  # MA50 非对称确认择时（长周期趋势跟踪，v2.8 备选方案）
  # 经 200 只基金 × 4 窗口回测验证：≥2窗口赢 71.6%，沪深300 赢 2/4 窗口
  # 策略逻辑：起始满仓，跌破MA50连续12天确认退出，站上MA50连续1天确认重新入场
  # 非对称确认：慢退出(12d)过滤假信号，快入场(1d)避免踏空
  # MA50 比 MA200 更短周期，持有周期约 8 个月/笔（vs MA200 约 18 个月/笔）
  ma200_timing:
    enabled: false               # v2.9 改用 BB 核心卫星策略
    ma_period: 50                # 趋势线周期（MA50，短期指标）
    exit_confirm_days: 12        # 跌破MA50连续N天确认退出（慢退出）
    entry_confirm_days: 1        # 站上MA50连续N天确认重新入场（快入场）
    buffer: 0.0                  # 缓冲带（0=无缓冲）
    buy_cooldown: 3              # 卖出后冷却N天再买入
    min_hold_days: 5             # 最少持有N天

  # 布林带核心卫星策略（v2.9 短线波段，几天到两周）
  # 核心仓位（core_ratio）：买入持有永不卖出 → 牛市捕获涨幅
  # 卫星仓位（1-core_ratio）：MA200下方做BB短线波段，MA200上方保持满仓
  # 卫星买入：BB下轨(2σ) + RSI<45 → 超卖抄底
  # 卫星卖出：回到BB中轨(MA20)止盈 / 超时14天
  # 持有周期：7-14个交易日（一周到两周）
  # 经 200 只基金 × 4 窗口验证：牛市-0.1%，非牛市+1.9%，CSI300非牛市+2.8%~+6.3%
  bb_swing:
    enabled: true
    core_ratio: 0.3              # 核心仓位比例（30%核心+70%卫星）
    bb_period: 20                # 布林带周期
    bb_mult: 2.0                 # 布林带倍数（2σ）
    rsi_buy_max: 45              # 买入RSI阈值（<45=超卖）
    max_hold_days: 14            # 最大持有天数（两周）
    min_hold_days: 7             # 最小持有天数（避免<7天1.5%赎回费）
    buy_cooldown: 2              # 卖出后冷却天数
  rules:
    buy:
      P1_golden_pullback:
        rsi_max: 45               # 从 40 放宽到 45
        decline_min: 2            # 从 3 放宽到 2
        decline_max: 7            # 从 5 放宽到 7
      P2_oversold_bounce:
        rsi_max: 35               # 从 30 放宽到 35
        max_drawdown_min: 0.06    # 从 0.08 放宽到 0.06
      P3_trend_pullback:
        decline_min: 2            # 从 3 放宽到 2
        decline_max: 7            # 从 5 放宽到 7
        sharpe_min: 0.3           # 从 0.5 放宽到 0.3
      P4_low_vol_dip:
        rsi_max: 40               # 从 35 放宽到 40
        vol_ratio_max: 1.0
      P5_deep_value:
        max_drawdown_min: 0.10    # 从 0.12 放宽到 0.10
        rsi_max: 40               # 从 35 放宽到 40
      P6_quality_dip:
        sharpe_min: 0.5           # 从 1.0 放宽到 0.5
        decline_min: 1            # 从 2 放宽到 1
        decline_max: 7            # 从 5 放宽到 7
      P7_vol_contraction:
        vol_ratio_max: 0.6
        pullback_min: 0.02        # 从 0.03 放宽到 0.02
      P8_strong_trend_dip:
        trend_strength_min: 0.03  # 从 0.05 放宽到 0.03
        decline_min: 1            # 从 2 放宽到 1
      P9_tsmom_cross:
        enabled: false            # 长线趋势跟踪，与短线 swing trading 不匹配，已禁用

    sell:
      S1_hard_stop:
        max_drawdown_min: 0.15         # 60日最大回撤 > 15% → 清仓
      S2_consecutive_rise:
        enabled: false              # 连涨止盈与趋势跟踪矛盾，改用 trailing stop
        rise_min: 7
        rsi_min: 85
      S3_surge_profit:
        monthly_return_min: 0.12       # 月涨幅 > 12%
        rsi_min: 80                    # 且 RSI > 80 → 减仓
      S4_risk_decay:
        sharpe_max: -1.0               # 滚动夏普 < -1.0（从 -0.5 收紧，减少误触发）
        monthly_return_max: -0.10      # 且 月收益 < -10%（从 -8% 收紧）
      S5_peak_retreat:
        pullback_min: 0.08             # 高点回撤 > 8%
        decline_min: 5                 # 且 连跌 ≥ 5 天 → 减仓
      S6_deviation:
        trend_strength_min: 0.15       # 偏离 MA200 > 15%
        rsi_min: 70                    # 且 RSI > 70 → 减仓
      S7_vol_spike:
        vol_ratio_min: 2.0             # 波动率 > 2.0× 历史 → 减仓
      S8_trend_confirm:
        enabled: false              # 胜率20%，牛市中80%卖飞，禁用
        monthly_return_max: -0.08
      S9_tsmom_bear:
        enabled: false            # 长线趋势跟踪，与短线 swing trading 不匹配，已禁用
      S10_death_cross:
        enabled: false             # 死叉减仓（默认禁用，S9已覆盖）

# 基金池筛选
universe:
  min_aum_yi: 5            # 排除规模不足 5 亿的小基金
  min_fund_age_days: 365   # 排除成立不足 1 年的新基金
  include_types:
    - "股票指数"
    - "联接基金"
    - "ETF"
    - "ETF联接"
    - "LOF"
    - "混合型"
    - "QDII"
  exclude_keywords:
    - "医药"
    - "医疗"
    - "科技"
    - "新能源"
    - "白酒"
    - "军工"
    - "国防"
    - "半导体"
    - "芯片"
    - "消费"
    - "金融"
    - "银行"
    - "证券"
    - "地产"
    - "房地产"
    - "传媒"
    - "环保"
    - "农业"
    - "钢铁"
    - "煤炭"
    - "有色"
    - "汽车"
    - "电力"
    - "通信"
    - "5G"
    - "人工智能"
    - "机器人"
    - "游戏"
    - "食品"
    - "养殖"
    - "光伏"
    - "锂电"
    - "稀土"
  exclude_name_patterns:
    - "FOF"
    - "基金中基金"
    - "货币"
    - "理财"
    - "持有期"   # X个月/X年持有期 — 锁定不可赎回
    - "定开"     # 定期开放 — 仅在开放期可申赎
    - "封闭"     # 封闭期 — 运作期封闭

# 缓存设置
cache:
  universe_refresh_days: 1
  nav_history_days: 1000

# 回测设置
backtest:
  initial_capital: 100000       # 初始资金
  max_holdings: 30              # 最多同时持有基金数（从 8 提高到 30，分散持仓）
  max_single_position: 0.10     # 单只基金最大仓位（从 5% 提高到 10%）
  max_total_position: 0.80      # 总仓位上限
  subscription_fee: 0.0015      # 默认申购费率（按基金类型区分，详见 portfolio.py）
  redemption_fee_normal: 0.005  # 正常赎回费率
  redemption_fee_short: 0.015   # 短期赎回费（持有<7天）